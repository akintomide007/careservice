version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: careservice-postgres
    environment:
      POSTGRES_USER: careuser
      POSTGRES_PASSWORD: carepass  # Change this in production!
      POSTGRES_DB: care_provider_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careuser -d care_provider_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - careservice-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: careservice-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - careservice-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner  # Use production stage
    container_name: careservice-backend
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      # Override for Docker internal network
      DATABASE_URL: postgresql://careuser:carepass@postgres:5432/care_provider_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - careservice-network

  # Web Dashboard
  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
      target: runner  # Use production stage
      args:
        # Pass the API URL from .env.production at build time
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: careservice-dashboard
    env_file:
      - ./web-dashboard/.env.production
    environment:
      NODE_ENV: production
      # API URL is set from .env.production file (auto-configured by deploy script)
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - careservice-network

networks:
  careservice-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
